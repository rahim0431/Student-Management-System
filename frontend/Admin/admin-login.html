<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login · Learnova</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-deep: #2C666E;
            --primary-light: #F0EDEE;
            --accent-sage: #3D7B84;
            --text-dark: #1F2C30;
            --text-muted: #4F5E63;
            --border-light: #D6D2D4;
            --card-bg: #FFFFFF;
            --shadow-sm: 0 8px 20px rgba(44, 102, 110, 0.08);
            --radius-card: 32px;
            --radius-button: 50px;
            --error-color: #D9534F;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #eff3f5;
            background-image: url("../low-poly-grid-haikei.svg");
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        *, *::before, *::after { box-sizing: border-box; }
        .login-container {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: var(--radius-card);
            box-shadow: 0 15px 35px rgba(44, 102, 110, 0.15);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .logo img { height: 84px; width: 84px; object-fit: contain; }
        .logo h1 { font-size: 2.4rem; color: var(--primary-deep); margin: 0; font-weight: 700; letter-spacing: -0.5px; }
        h2 {
            font-size: 1.5rem;
            color: var(--text-dark);
            margin-bottom: 10px;
        }
        p {
            color: var(--text-muted);
            margin-bottom: 30px;
        }
        .login-form .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .login-form label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
        }
        .login-form input {
            width: 100%;
            height: 50px;
            padding: 0 18px;
            border-radius: 12px;
            border: 1px solid var(--border-light);
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-form input:focus {
            outline: none;
            border-color: var(--primary-deep);
            box-shadow: 0 0 0 3px rgba(44, 102, 110, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            background: var(--primary-deep);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius-button);
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .login-btn:hover { background: var(--accent-sage); }
        .login-btn:active { transform: scale(0.98); }
        #error-message {
            color: var(--error-color);
            margin-top: 20px;
            font-weight: 500;
            min-height: 20px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <a href="./Home Page/home.html" class="logo">
            <img src="icons/graduate.gif" alt="Learnova Logo">
            <h1>Learnova</h1>
        </a>
        <h2>Admin Portal</h2>
        <p>Please sign in to continue</p>
        <form id="loginForm" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>
        <div id="error-message"></div>
    </div>

    <script>
        const token = localStorage.getItem("token");
        const role = localStorage.getItem("role");

        if (token && role === "admin") {
            window.location.href = "admin-dashboard.html";
        }
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            const submitBtn = this.querySelector('button[type="submit"]');

            errorMessage.textContent = '';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Verifying...';

            try {
                const response = await fetch('http://127.0.0.1:8000/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ email, password })
            });
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || 'Login failed. Please check your credentials.');

                console.log(data);

                if (data.role && data.role.toLowerCase() === 'admin') {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('role', data.role);
                    window.location.href = 'admin-dashboard.html';
                } else {
                    throw new Error('Access denied. Administrator privileges required.');
                }
                
            } catch (error) {
                errorMessage.textContent = error.message;
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
